name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Pytest
        run: pytest -q
      - name: Mock end-to-end
        run: |
          meta-agent run -i tests/fixtures/fastq -o /tmp/mga_ci --mode mock --yes \
            -q "IBD biomarker discovery"
          test -f /tmp/mga_ci/final_report.html
          test -f /tmp/mga_ci/report/methods.md
          test -f /tmp/mga_ci/logs/events.jsonl
