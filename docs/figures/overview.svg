<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 420" role="img" aria-labelledby="title desc">
  <title id="title">Metagenomic Research Agent - Graphical Abstract</title>
  <desc id="desc">End-to-end multi-agent workflow from FASTQ input through planning, sandboxed execution with self-heal, evidence grounding, and reproducible report output.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5c6b7a"/>
    </marker>
    <style type="text/css"><![CDATA[
      .panel { fill: #f7f8fa; stroke: #d5dde5; stroke-width: 1.25; }
      .panel-in { fill: #eef6f4; stroke: #7aa89a; }
      .panel-plan { fill: #f3f6fb; stroke: #8a9bb5; }
      .panel-exec { fill: #fbf6ef; stroke: #c4a574; }
      .panel-out { fill: #f5f3fa; stroke: #9b8fb8; }
      .title { font: 700 15px Helvetica, Arial, sans-serif; fill: #1f2a33; }
      .sub { font: 500 11px Helvetica, Arial, sans-serif; fill: #5c6b7a; }
      .item { font: 400 11.5px Helvetica, Arial, sans-serif; fill: #2c3a45; }
      .chip { font: 600 10px Helvetica, Arial, sans-serif; fill: #1f2a33; }
      .caption { font: 400 11px Helvetica, Arial, sans-serif; fill: #5c6b7a; }
      .banner { font: 700 13px Helvetica, Arial, sans-serif; fill: #1f2a33; }
      .tiny { font: 400 9.5px Helvetica, Arial, sans-serif; fill: #6a7886; }
    ]]></style>
  </defs>
  <rect width="1120" height="420" fill="#ffffff"/>
  <text x="40" y="36" class="banner">Metagenomic Research Agent - Graphical Abstract</text>
  <text x="40" y="54" class="caption">Autonomous AI Scientist for shotgun metagenomics: plan, execute, ground, review, report</text>

  <rect x="40" y="78" width="150" height="220" rx="10" class="panel-in"/>
  <text x="55" y="104" class="title">1. Input</text>
  <text x="55" y="128" class="item">FASTQ / directory</text>
  <text x="55" y="146" class="item">Research query</text>
  <text x="55" y="164" class="item">Sample metadata</text>
  <text x="55" y="182" class="item">(optional config)</text>
  <rect x="55" y="200" width="120" height="22" rx="4" fill="#ffffff" stroke="#7aa89a"/>
  <text x="63" y="215" class="chip">CLI / API / Web UI</text>
  <text x="55" y="250" class="tiny">No LLM on raw reads</text>
  <text x="55" y="264" class="tiny">Tables to evidence chain</text>

  <line x1="198" y1="188" x2="228" y2="188" stroke="#5c6b7a" stroke-width="1.75" marker-end="url(#arrow)"/>

  <rect x="236" y="78" width="168" height="220" rx="10" class="panel-plan"/>
  <text x="251" y="104" class="title">2. Plan + HITL</text>
  <text x="251" y="128" class="item">Router / Bio-reasoning</text>
  <text x="251" y="146" class="item">Supervisor / Planner</text>
  <text x="251" y="164" class="item">Contract / DAG export</text>
  <rect x="251" y="184" width="138" height="56" rx="6" fill="#ffffff" stroke="#8a9bb5"/>
  <text x="260" y="204" class="chip">Human-in-the-loop</text>
  <text x="260" y="220" class="tiny">Assembly / DB / OTU</text>
  <text x="260" y="234" class="tiny">Self-heal / Report</text>
  <text x="251" y="268" class="tiny">Validated params.yaml</text>

  <line x1="412" y1="188" x2="442" y2="188" stroke="#5c6b7a" stroke-width="1.75" marker-end="url(#arrow)"/>

  <rect x="450" y="78" width="220" height="220" rx="10" class="panel-exec"/>
  <text x="465" y="104" class="title">3. Execute (Swarm)</text>
  <text x="465" y="126" class="sub">Container-sandboxed tools</text>
  <rect x="465" y="138" width="54" height="20" rx="4" fill="#fff" stroke="#c4a574"/><text x="476" y="152" class="chip">QC</text>
  <rect x="525" y="138" width="72" height="20" rx="4" fill="#fff" stroke="#c4a574"/><text x="532" y="152" class="chip">Taxonomy</text>
  <rect x="603" y="138" width="52" height="20" rx="4" fill="#fff" stroke="#c4a574"/><text x="610" y="152" class="chip">Func</text>
  <rect x="465" y="164" width="78" height="20" rx="4" fill="#fff" stroke="#c4a574"/><text x="472" y="178" class="chip">Resistance</text>
  <rect x="549" y="164" width="52" height="20" rx="4" fill="#fff" stroke="#c4a574"/><text x="557" y="178" class="chip">Stats</text>
  <rect x="607" y="164" width="48" height="20" rx="4" fill="#fff" stroke="#c4a574"/><text x="612" y="178" class="chip">MAG</text>
  <rect x="465" y="198" width="190" height="72" rx="6" fill="#ffffff" stroke="#c4a574" stroke-dasharray="4 3"/>
  <text x="476" y="218" class="chip">Validate - Self-Heal loop</text>
  <text x="476" y="236" class="tiny">Resource / platform fixes auto</text>
  <text x="476" y="250" class="tiny">High-risk actions: HITL gate</text>
  <text x="476" y="264" class="tiny">max_retries / FPR audited</text>

  <line x1="678" y1="188" x2="708" y2="188" stroke="#5c6b7a" stroke-width="1.75" marker-end="url(#arrow)"/>

  <rect x="716" y="78" width="168" height="220" rx="10" class="panel"/>
  <text x="731" y="104" class="title">4. Interpret</text>
  <text x="731" y="128" class="item">Critic / Literature</text>
  <text x="731" y="146" class="item">Evidence + KG / RAG</text>
  <text x="731" y="164" class="item">Scientific Reviewer</text>
  <text x="731" y="182" class="item">Reflection / Code</text>
  <text x="731" y="200" class="item">PI review / Viz / XAI</text>
  <rect x="731" y="220" width="138" height="40" rx="6" fill="#ffffff" stroke="#d5dde5"/>
  <text x="740" y="238" class="tiny">Grounded claims only</text>
  <text x="740" y="252" class="tiny">(p / q / effect from tables)</text>

  <line x1="892" y1="188" x2="922" y2="188" stroke="#5c6b7a" stroke-width="1.75" marker-end="url(#arrow)"/>

  <rect x="930" y="78" width="150" height="220" rx="10" class="panel-out"/>
  <text x="945" y="104" class="title">5. Output</text>
  <text x="945" y="128" class="item">final_report.html</text>
  <text x="945" y="146" class="item">Methods / figures</text>
  <text x="945" y="164" class="item">biomarkers / R export</text>
  <text x="945" y="182" class="item">MetaAgentScore</text>
  <text x="945" y="200" class="item">reproducibility/</text>
  <rect x="945" y="220" width="120" height="40" rx="6" fill="#ffffff" stroke="#9b8fb8"/>
  <text x="954" y="238" class="tiny">Audit: self-heal,</text>
  <text x="954" y="252" class="tiny">HITL, reasoning chain</text>

  <rect x="40" y="320" width="1040" height="72" rx="8" fill="#f7f8fa" stroke="#e2e8ee"/>
  <text x="56" y="344" class="title">Guarantees</text>
  <text x="56" y="366" class="item">Public MIT code + bundled demo FASTQ; one-click scripts/reproduce_demo.sh</text>
  <text x="56" y="384" class="item">Self-heal FPR suite; high-risk corrections require HITL; metagenomics only (no multi-omics)</text>
</svg>
