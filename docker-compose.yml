# Orchestration API. Reference databases are NOT built into the image.
# Mount a host DB tree when needed, e.g.:
#   META_REF=/ref/databases docker compose up --build
services:
  meta-agent:
    build: .
    image: metagenomic-agent:0.25.0
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-chat}
    volumes:
      - ./config:/app/config:ro
      - meta_results:/results
      - ${META_DATA:-./tests/fixtures}:/data:ro
      # Default: empty named volume (tiny). Override with host path for real DBs.
      - ${META_REF:-meta_ref_empty}:/ref:ro
    command: ["serve", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  meta_results:
  meta_ref_empty:
