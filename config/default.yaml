mode: mock  # mock | local | conda | docker | apptainer
workdir: ./workdir
max_retries: 2

execution:
  engine: langgraph  # langgraph | snakemake | nextflow
  # Agent writes outdir/workflow/params.yaml; engines consume it (no LLM free-form shell)
  # nf: -resume; smk: --rerun-incomplete
  skip_swarm_on_engine_ok: true  # NF/SMK 成功则不双跑 LangGraph swarm

# Prefer container isolation for bio tools (MCP-style sandbox). Avoid fragile host binaries.
sandbox:
  backend: ""  # empty → follow mode; or mock|local|conda|docker|apptainer
  prefer_container: true
  platform: auto  # auto | linux/amd64 | linux/arm64 （Apple Silicon 建议 linux/amd64）
  allow_mock_fallback: true  # 自愈最后手段：切 mock 保流程

# BioContainers images live in tools/context.DEFAULT_IMAGES; override pins here:
docker:
  threads: 8
  platform: linux/amd64  # biocontainers 多为 amd64；Apple Silicon 走模拟
  images: {}
  # agent_image: ghcr.io/bio-apple/metagenomic_agent:latest

# Apptainer/Singularity SIF cache on HPC (also exported in submit scripts)
apptainer:
  sif_dir: ""  # e.g. /scratch/$USER/containers
  pull_cache: true

linux:
  threads: 16
  memory_gb: 64
  max_threads: 64
  max_memory_gb: 256
  gpus: 0
  scheduler: auto  # auto | slurm | pbs | sge | local
  prefer_shm: true
  shm_db_root: /dev/shm
  host_method: bowtie2  # bowtie2 | kneaddata
  conda_envs:
    kraken2: kraken2_env
    gtdbtk: gtdbtk
    metagenomics: metagenomics
  slurm: false
  slurm_queue: normal
  slurm_account: ""
  slurm_time: "24:00:00"
  pbs_queue: workq
  sge_queue: all.q
  nextflow_executor: local

routing:
  enable_glm: true
  dual_path: true
  short_read_glm_assist: false
  epsilon: 0.15
  short_read_tools: ["kraken2", "metaphlan"]
  long_read_tools: ["microcafe", "microrag"]

paths:
  host_index: ""
  kraken2_db: "database/kraken_db"
  metaphlan_db: ""
  gtdb: "database/gtdb"
  eggnog: "database/eggnog"
  diamond_db: ""
  glm_weights: ""
  glm_inference_cmd: ""  # e.g. "python scripts/run_glm.py --weights {weights} --r1 {r1} --out {output}"

pipeline:
  enable_host_filter: true
  taxonomy_tools: ["kraken2", "metaphlan"]
  enable_functional: true
  enable_assembly: false
  enable_statistics: true
  enable_humann: false
  default_assembler: megahit  # megahit | metaspades
  binners: ["metabat2", "maxbin2"]

llm:
  provider: openai_compatible  # openai_compatible | ollama | vllm
  model: deepseek-chat
  temperature: 0.2
  # For Linux GPU nodes: set OPENAI_BASE_URL to vLLM/Ollama OpenAI-compatible endpoint

literature:
  pubmed: true
  europe_pmc: true
  openalex: true
  semantic_scholar: true
  online: true  # set false / use mock mode to skip remote literature APIs
  rag: true

project:
  name: ""
  host: human
  platform: NovaSeq / Illumina

report:
  manuscript_template: Microbiome  # Nature | Cell | ISME Journal | Microbiome | Gut Microbes

visualization:
  default_q: 0.1  # FDR q cutoff for interactive heatmap / volcano highlighting
  top_n_taxa: 25
  lite: true  # on-demand JSON fetch; set false to embed all Plotly specs (small cohorts only)
  max_inline_biomarkers: 50

cache:
  enabled: true  # LangGraph swarm step cache under outdir/cache/steps
  include_config_hash: true  # invalidate cache when threads/images/assembler change
  per_sample_assembly: true  # reuse MEGAHIT/SPAdes contigs under outdir/<sample>/assembly/

pi:
  max_replans: 1

rag:
  mode: keyword  # keyword | semantic
  authority_dbs:
    - gtdb
    - ncbi_taxonomy
    - kegg
    - uniprot
    - card

interpretation:
  require_grounding: true  # block ungrounded taxa; LLM may only paraphrase retrieval context
  require_evidence_chain: true  # p/q/effect must come from biomarkers/LEfSe tables (no invented stats)

# Long-context: agents consume statistical metadata, not raw Fastq/Bam/Fasta contents.
summary:
  enabled: true
  max_llm_chars: 12000

reproducibility:
  auto_export: true  # write reproducible.nf / .smk + seeds + config_snapshot after analysis
  seed: null  # integer to pin; null → derived from run_id

validation:
  min_read_retention: 0.3
  max_host_fraction: 0.95
  # CheckM2: medium gate (technical fail) + high-quality target (Completeness>90, Contamination<5)
  min_mag_completeness: 50
  max_mag_contamination: 10
  mag_high_completeness: 90
  mag_high_contamination: 5
  min_classification_rate: 0.3
  max_unclassified_fraction: 0.5  # Kraken2/MetaPhlAn unclassified too high → swap DB / raise confidence
  require_gut_markers: true
  contract_hard_fail: false  # true → abort swarm on contract ERROR
  plan_validator_hard_fail: false  # true → block when domain constraints missing
  gut_marker_genera:
    - Bacteroides
    - Faecalibacterium
    - Prevotella
    - Bifidobacterium
    - Roseburia
    - Akkermansia

hitl:
  auto_confirm: true  # set false to require interactive confirmation; CLI --yes overrides to true
  # Critical gates (bioinformatician confirmation)
  require_assembly_confirm: true  # before heavy Assembly/binning
  require_otu_filter_confirm: true  # before rare OTU/ASV culling
  gate_before_assembly_run: true  # mid-swarm re-check if not yet confirmed
  gate_before_otu_filter: true
  default_confirm_assembly: true  # auto default A=submit when auto_confirm
  default_otu_filter: A  # A=balanced B=strict C=lenient D=none

statistics:
  demo_mode: false  # if true (or mock without groups), use explicit synthetic case/control matrix
  lefse_like: true
  ancom_like: true
  # Applied after HITL OTU/ASV gate (defaults = balanced preset)
  min_prevalence: 0.1
  min_rel_abundance: 1.0e-5
  otu_filter_preset: balanced
