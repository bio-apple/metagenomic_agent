mode: mock  # mock | docker
workdir: ./workdir
max_retries: 2

docker:
  image: meta:latest
  threads: 8

paths:
  host_index: ""
  kraken2_db: "database/kraken_db"
  metaphlan_db: ""
  gtdb: "database/gtdb"
  eggnog: "database/eggnog"

pipeline:
  enable_host_filter: true
  taxonomy_tools: ["kraken2", "metaphlan"]
  enable_functional: true
  enable_assembly: false
  enable_statistics: true
  enable_humann: false

llm:
  provider: openai_compatible
  model: deepseek-chat
  temperature: 0.2

literature:
  pubmed: true

validation:
  min_read_retention: 0.3
  max_host_fraction: 0.95
  require_gut_markers: true
  gut_marker_genera:
    - Bacteroides
    - Faecalibacterium
    - Prevotella
    - Bifidobacterium
    - Roseburia

hitl:
  auto_confirm: true
